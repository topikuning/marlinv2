services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: knmp_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-knmp_secure_password}
      POSTGRES_DB: knmp_monitor
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knmp_user -d knmp_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://knmp_user:${DB_PASSWORD:-knmp_secure_password}@db:5432/knmp_monitor
      SECRET_KEY: ${SECRET_KEY:-change-me-32-character-random-string-prod}
      DEBUG: "false"
      CORS_ORIGINS: "http://localhost,http://localhost:80,http://frontend"
      UPLOAD_DIR: /app/uploads
      SCHEDULER_ENABLED: "true"
      WA_ENABLED: "${WA_ENABLED:-false}"
      WA_API_TOKEN: "${WA_API_TOKEN:-}"
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
  uploads:
